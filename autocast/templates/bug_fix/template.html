<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Bug Fix Video Template</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: #FFFFFF;
            overflow: hidden;
            position: relative;
        }

        /* 顶部警告横幅 */
        .warning-banner {
            width: 100%;
            height: 180px;
            background: linear-gradient(90deg, #B71C1C 0%, #E53935 50%, #B71C1C 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 30px rgba(229, 57, 53, 0.5);
        }
        .warning-banner::before {
            content: "⚠️";
            font-size: 80px;
            margin-right: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .bug-title {
            font-size: 64px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .bug-id {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            background: rgba(0,0,0,0.3);
            padding: 10px 24px;
            border-radius: 30px;
        }

        /* 中间问题描述区域 */
        .problem-section {
            margin: 60px 80px 40px;
            padding: 40px;
            background: rgba(183, 28, 28, 0.15);
            border: 2px solid rgba(229, 57, 53, 0.4);
            border-radius: 20px;
            position: relative;
        }
        .problem-section::before {
            content: "问题描述";
            position: absolute;
            top: -18px;
            left: 40px;
            background: #1A1A2E;
            padding: 0 16px;
            font-size: 24px;
            color: #E53935;
            font-weight: bold;
        }
        .problem-text {
            font-size: 36px;
            line-height: 1.6;
            color: #FFCDD2;
        }

        /* 底部修复方案区域 */
        .fix-section {
            margin: 0 80px 60px;
            padding: 40px;
            background: rgba(67, 160, 71, 0.15);
            border: 2px solid rgba(67, 160, 71, 0.4);
            border-radius: 20px;
            position: relative;
        }
        .fix-section::before {
            content: "修复方案";
            position: absolute;
            top: -18px;
            left: 40px;
            background: #1A1A2E;
            padding: 0 16px;
            font-size: 24px;
            color: #43A047;
            font-weight: bold;
        }
        .fix-section::after {
            content: "✅";
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 60px;
            animation: checkPop 0.6s ease-out;
        }
        @keyframes checkPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }
        .fix-text {
            font-size: 36px;
            line-height: 1.6;
            color: #C8E6C9;
        }

        /* 进度指示器 */
        .progress-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #E53935, #43A047);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-label {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: rgba(255,255,255,0.6);
        }

        /* 对比箭头 */
        .arrow-divider {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }
        .arrow-down {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #FF9800;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
    </style>
</head>
<body>
    <!-- 顶部 Bug 标题 -->
    <div class="warning-banner">
        <div class="bug-title">{{ bug_title | default("严重 Bug 修复") }}</div>
        <div class="bug-id">#{{ bug_id | default("BUG-001") }}</div>
    </div>

    <!-- 中间问题描述 -->
    <div class="problem-section">
        <div class="problem-text">{{ problem_desc | default("某些情况下数据处理模块会抛出空指针异常，导致批量任务中断。") }}</div>
    </div>

    <!-- 对比箭头 -->
    <div class="arrow-divider">
        <div class="arrow-down"></div>
    </div>

    <!-- 底部修复方案 -->
    <div class="fix-section">
        <div class="fix-text">{{ fix_desc | default("已增加空值检查与容错机制，并优化了异常处理流程，确保任务稳定运行。") }}</div>
    </div>

    <!-- 进度条 -->
    <div class="progress-label">{{ current_step }} / {{ total_steps }}</div>
    <div class="progress-bar">
        <div class="progress-fill" style="width: {{ progress_percent }}%"></div>
    </div>
</body>
</html>
