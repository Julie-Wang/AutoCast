name: AutoCast - Generate Release Video

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      template:
        description: "视频模板"
        required: true
        default: "release_note"
        type: choice
        options:
          - release_note
          - bug_fix
          - feature_demo
          - contributor_thanks

jobs:
  autocast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install AutoCast
        run: |
          pip install git+https://github.com/Julie-Wang/AutoCast.git

      - name: Generate video
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          autocast pipeline doc_to_video README.md --template ${{ github.event.inputs.template || 'release_note' }} --output release_video

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-video
          path: output/videos/release_video.mp4

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: output/videos/release_video.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
